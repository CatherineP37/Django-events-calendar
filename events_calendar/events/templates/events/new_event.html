{% extends 'events/base.html' %}
{% load static %}
{% block title %}New event{% endblock %}
{% block content %}

    <main>
        
        <form method="post" class="event-form">
            <h1>ADD AN EVENT</h1>
            {% csrf_token %}        
            {{ form }}
            <button type="submit">Add event</button>        
        </form>
        <a href="{% url 'events:calendar' %}" class="calendar-button">Back to calendar</a>        

    </main>   

    
{% endblock %}
